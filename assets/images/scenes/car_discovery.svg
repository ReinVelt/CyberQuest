<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <!-- Bench Discovery Scene - Stone Bench with USB Stick taped underneath -->
  
  <defs>
    <linearGradient id="nightSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a35"/>
      <stop offset="100%" style="stop-color:#0f0f28"/>
    </linearGradient>
    
    <linearGradient id="volvoBodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a6a78"/>
      <stop offset="50%" style="stop-color:#4a5a68"/>
      <stop offset="100%" style="stop-color:#3a4a58"/>
    </linearGradient>
    
    <linearGradient id="ductTapeGray" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8a8a8"/>
      <stop offset="50%" style="stop-color:#888888"/>
      <stop offset="100%" style="stop-color:#686868"/>
    </linearGradient>
    
    <radialGradient id="moonGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffffee;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#ffffe0;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0f0f28;stop-opacity:0"/>
    </radialGradient>
    
    <radialGradient id="usbGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#ffffaa;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  
  <!-- NIGHT BACKGROUND -->
  <rect width="1920" height="1080" fill="url(#nightSky)"/>
  
  <!-- Moon -->
  <ellipse cx="1700" cy="180" rx="180" ry="180" fill="url(#moonGlow)" filter="url(#glow)" opacity="0.6"/>
  <circle cx="1700" cy="180" r="70" fill="#fffff8"/>
  <circle cx="1692" cy="172" r="12" fill="#f0f0e8" opacity="0.6"/>
  <circle cx="1710" cy="190" r="8" fill="#f0f0e8" opacity="0.5"/>
  
  <!-- Stars -->
  <circle cx="200" cy="100" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="400" cy="150" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="600" cy="80" r="2" fill="#fff" opacity="0.9"/>
  <circle cx="850" cy="120" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="1100" cy="90" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="1450" cy="140" r="1.5" fill="#fff" opacity="0.7"/>
  
  <!-- Parking lot ground -->
  <rect x="0" y="680" width="1920" height="400" fill="#1a1a28"/>
  <rect x="0" y="680" width="1920" height="20" fill="#252535" opacity="0.3"/>
  
  <!-- Parking lines -->
  <line x1="600" y1="700" x2="650" y2="1080" stroke="#2a2a35" stroke-width="6" stroke-dasharray="30,30" opacity="0.4"/>
  <line x1="1200" y1="700" x2="1280" y2="1080" stroke="#2a2a35" stroke-width="6" stroke-dasharray="30,30" opacity="0.4"/>
  
  <!-- ============================================ -->
  <!-- MONASTERY STONE BENCH (full side view) -->
  <!-- ============================================ -->
  <g transform="translate(80, 380)">
    
    <!-- Bench shadow -->
    <ellipse cx="800" cy="520" rx="770" ry="35" fill="#000" opacity="0.55"/>
    
    <!-- Seat slab top surface -->
    <rect x="60" y="230" width="1480" height="130" rx="8" fill="#5a5a62"
          stroke="#3a3a42" stroke-width="4"/>
    <!-- Moonlight highlight on seat -->
    <rect x="75" y="233" width="1450" height="28" rx="4" fill="#7a7a82" opacity="0.5"/>
    <!-- Seat front face -->
    <rect x="55" y="360" width="1490" height="42" rx="5" fill="#3c3c46"/>
    
    <!-- Left support leg -->
    <rect x="80" y="400" width="240" height="300" rx="8" fill="#484852"
          stroke="#2a2a32" stroke-width="3"/>
    <rect x="90" y="408" width="220" height="30" rx="3" fill="#5c5c68" opacity="0.6"/>
    
    <!-- Right support leg -->
    <rect x="1280" y="400" width="240" height="300" rx="8" fill="#484852"
          stroke="#2a2a32" stroke-width="3"/>
    <rect x="1290" y="408" width="220" height="30" rx="3" fill="#5c5c68" opacity="0.6"/>
    
    <!-- Base plates (stone feet) -->
    <rect x="50" y="690" width="300" height="22" rx="4" fill="#2e2e38"/>
    <rect x="1250" y="690" width="300" height="22" rx="4" fill="#2e2e38"/>
    
    <!-- === UNDERSIDE SPACE (dark, mysterious) === -->
    <rect x="320" y="400" width="960" height="145" fill="#0e0e18" opacity="0.92" rx="3"/>
    
    <!-- Subtle glow from USB area -->
    <ellipse cx="800" cy="472" rx="280" ry="60" fill="url(#usbGlow)" opacity="0.6"/>
    
    <!-- USB STICK taped under bench -->
    <g transform="translate(690, 420)">
      <!-- Duct tape horizontal strip -->
      <rect x="-20" y="25" width="260" height="42" rx="4"
            fill="url(#ductTapeGray)" stroke="#585858" stroke-width="3"/>
      <!-- Tape texture lines -->
      <line x1="-15" y1="32" x2="235" y2="32" stroke="#989898" stroke-width="1" opacity="0.4"/>
      <line x1="-15" y1="40" x2="235" y2="40" stroke="#787878" stroke-width="1" opacity="0.35"/>
      <line x1="-15" y1="48" x2="235" y2="48" stroke="#989898" stroke-width="1" opacity="0.4"/>
      <line x1="-15" y1="56" x2="235" y2="56" stroke="#787878" stroke-width="1" opacity="0.35"/>
      
      <!-- USB body -->
      <rect x="20" y="10" width="90" height="55" rx="5"
            fill="#1a1a1a" stroke="#000" stroke-width="3"/>
      <rect x="24" y="14" width="82" height="47" fill="#2a2a2a" rx="4"/>
      <!-- Label -->
      <rect x="28" y="18" width="70" height="39" fill="#383838" rx="2"/>
      <rect x="32" y="22" width="22" height="28" fill="#cc3333" rx="1"/>
      <text x="43" y="41" text-anchor="middle" font-family="Arial" font-size="12"
            fill="#fff" font-weight="bold">SD</text>
      <text x="68" y="35" text-anchor="middle" font-family="Arial" font-size="10"
            fill="#888">64GB</text>
      <!-- Connector -->
      <rect x="110" y="22" width="28" height="28" fill="#2a2a2a" stroke="#0a0a0a" stroke-width="2"/>
      <rect x="113" y="25" width="22" height="22" fill="#363636"/>
      <rect x="115" y="28" width="4" height="14" fill="#d4af37"/>
      <rect x="123" y="28" width="4" height="14" fill="#d4af37"/>
    </g>
    
  </g>
  
  <!-- Moonlight pool on ground beneath bench -->
  <ellipse cx="960" cy="920" rx="600" ry="55" fill="rgba(180,190,215,0.05)"/>
  
  <!-- ============================================ -->
  <!-- ZOOM INSET: BENCH UNDERSIDE WITH USB DETAIL -->
  <!-- ============================================ -->
  <g transform="translate(1150, 150)">
    
    <!-- Inset border frame -->
    <rect x="0" y="0" width="700" height="550" fill="#0c0c18" stroke="#88ddff" stroke-width="6" rx="10"/>
    <rect x="6" y="6" width="688" height="538" fill="#0e0e20" stroke="#3a4a5a" stroke-width="2" rx="8"/>
    
    <!-- Stone slab underside (top half of inset) — close-up view looking up -->
    <rect x="20" y="20" width="660" height="200" fill="#4a4a54" rx="4" stroke="#2e2e38" stroke-width="2"/>
    <!-- Stone surface highlight -->
    <rect x="20" y="20" width="660" height="18" fill="#5e5e68" rx="4" opacity="0.6"/>
    <!-- Stone grain lines across slab -->
    <line x1="30" y1="55"  x2="670" y2="55"  stroke="#3a3a44" stroke-width="1.5" opacity="0.5"/>
    <line x1="30" y1="85"  x2="670" y2="85"  stroke="#565660" stroke-width="1"   opacity="0.4"/>
    <line x1="30" y1="115" x2="670" y2="115" stroke="#3a3a44" stroke-width="1.5" opacity="0.5"/>
    <line x1="30" y1="148" x2="670" y2="148" stroke="#565660" stroke-width="1"   opacity="0.4"/>
    <line x1="30" y1="180" x2="670" y2="180" stroke="#3a3a44" stroke-width="1.5" opacity="0.4"/>
    <!-- Slab bottom edge -->
    <rect x="20" y="216" width="660" height="12" fill="#2a2a32" rx="2" opacity="0.8"/>
    
    <!-- Dark gap beneath slab (where USB is hidden) -->
    <rect x="20" y="228" width="660" height="300" fill="#07070f" rx="3"/>
    
    <!-- Ambient glow from USB inside the gap -->
    <ellipse cx="350" cy="340" rx="260" ry="90" fill="url(#usbGlow)" opacity="0.35"/>
    
    <!-- USB STICK taped to underside of slab, centre of inset -->
    <g transform="translate(210, 228)">
      
      <!-- Horizontal duct tape strip holding USB to stone -->
      <rect x="-10" y="0" width="300" height="36" fill="url(#ductTapeGray)" stroke="#585858" stroke-width="2" rx="3"/>
      <line x1="-5"  y1="8"  x2="285" y2="8"  stroke="#989898" stroke-width="1" opacity="0.4"/>
      <line x1="-5"  y1="16" x2="285" y2="16" stroke="#787878" stroke-width="1" opacity="0.35"/>
      <line x1="-5"  y1="24" x2="285" y2="24" stroke="#989898" stroke-width="1" opacity="0.4"/>
      <!-- Tape shine -->
      <rect x="-8" y="2" width="296" height="7" fill="#c8c8c8" opacity="0.2" rx="2"/>
      
      <!-- USB body (centred under tape) -->
      <rect x="60" y="-18" width="120" height="60" fill="#1a1a1a" stroke="#000" stroke-width="3" rx="5"/>
      <rect x="64" y="-14" width="112" height="52" fill="#2a2a2a" rx="4"/>
      <!-- Label -->
      <rect x="68" y="-10" width="96" height="44" fill="#3a3a3a" rx="2"/>
      <!-- SanDisk red block -->
      <rect x="72" y="-6"  width="24" height="36" fill="#cc3333" rx="1"/>
      <text x="84" y="17" text-anchor="middle" font-family="Arial" font-size="12" fill="#fff" font-weight="bold">SD</text>
      <!-- Capacity -->
      <text x="130" y="12" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">64GB</text>
      <!-- Gold connector pins -->
      <rect x="180" y="-4" width="32" height="28" fill="#2a2a2a" stroke="#0a0a0a" stroke-width="2" rx="2"/>
      <rect x="183" y="-1" width="26" height="22" fill="#363636"/>
      <rect x="185" y="2"  width="5" height="16" fill="#d4af37"/>
      <rect x="193" y="2"  width="5" height="16" fill="#d4af37"/>
      
      <!-- Second tape strip across connector end -->
      <rect x="160" y="-6" width="56" height="48" fill="url(#ductTapeGray)" stroke="#585858" stroke-width="2" rx="2" opacity="0.75"/>
      <line x1="165" y1="0"  x2="211" y2="0"  stroke="#989898" stroke-width="1" opacity="0.4"/>
      <line x1="165" y1="8"  x2="211" y2="8"  stroke="#787878" stroke-width="1" opacity="0.4"/>
      <line x1="165" y1="16" x2="211" y2="16" stroke="#989898" stroke-width="1" opacity="0.4"/>
      <line x1="165" y1="24" x2="211" y2="24" stroke="#787878" stroke-width="1" opacity="0.4"/>
      
      <!-- Handwritten note taped on -->
      <rect x="55" y="50" width="170" height="65" fill="#ffffdd" stroke="#d5d5aa" stroke-width="2" rx="3"/>
      <rect x="57" y="52" width="166" height="9" fill="#ffffc8" opacity="0.5"/>
      <text x="140" y="73"  text-anchor="middle" font-family="'Courier New',monospace" font-size="13" fill="#1a1a1a" font-weight="bold">TRUST THE</text>
      <text x="140" y="90"  text-anchor="middle" font-family="'Courier New',monospace" font-size="13" fill="#1a1a1a" font-weight="bold">PROCESS</text>
      <line x1="80" y1="95" x2="200" y2="95" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="140" y="108" text-anchor="middle" font-family="'Courier New',monospace" font-size="9"  fill="#4a4a4a" font-weight="bold">AIR-GAPPED ONLY</text>
      
    </g>
    
    <!-- Label -->
    <rect x="10" y="10" width="160" height="32" fill="#000" opacity="0.75" rx="5"/>
    <text x="90" y="31" text-anchor="middle" font-family="Arial" font-size="17" fill="#88ddff" font-weight="bold">UNDERSIDE</text>
    
  </g>
  
  <!-- Connector line from bench underside to zoom inset -->
  <line x1="960" y1="540" x2="1150" y2="425" stroke="#88ddff" stroke-width="4" stroke-dasharray="10,10" opacity="0.6"/>
  <circle cx="960" cy="540" r="35" fill="none" stroke="#88ddff" stroke-width="5" opacity="0.7"/>
  
  <!-- THOUGHT BUBBLE -->
  <g transform="translate(400, 150)">
    <ellipse cx="-50" cy="200" rx="15" ry="12" fill="#fff" stroke="#222" stroke-width="3"/>
    <ellipse cx="-80" cy="220" rx="10" ry="8" fill="#fff" stroke="#222" stroke-width="2"/>
    <ellipse cx="-100" cy="235" rx="6" ry="5" fill="#fff" stroke="#222" stroke-width="2"/>
    
    <ellipse cx="0" cy="100" rx="180" ry="100" fill="#fff" stroke="#222" stroke-width="5"/>
    
    <text x="0" y="70" text-anchor="middle" font-family="'Impact', Arial Black" font-size="48" fill="#cc0000" font-weight="bold">WTF?!</text>
    <text x="0" y="110" text-anchor="middle" font-family="Arial" font-size="19" fill="#1a1a1a">She left a message.</text>
    <text x="0" y="135" text-anchor="middle" font-family="Arial" font-size="19" fill="#1a1a1a">It was here all along...</text>
  </g>
  
  <!-- Title bar -->
  <rect x="0" y="1010" width="1920" height="70" fill="#000" opacity="0.9"/>
  <text x="960" y="1055" text-anchor="middle" fill="#88ddff" font-family="'Arial Black'" font-size="36" font-weight="bold">THE USB STICK</text>
  <text x="960" y="1035" text-anchor="middle" fill="#6699cc" font-family="monospace" font-size="16" opacity="0.8">Ter Apel Klooster — Stone Bench — 23:03</text>
  
</svg>
